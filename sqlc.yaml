version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "db/migrations"
    gen:
      go:
        package: "database"
        out: "internal/database"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type:
              type: "UUID"
              import: "github.com/google/uuid"
          - db_type: "uuid"
            nullable: true
            go_type:
              type: "UUID"
              import: "github.com/google/uuid"
              pointer: true
          - db_type: "numeric"
            go_type:
              type: "Decimal"
              import: "github.com/shopspring/decimal"
          - db_type: "numeric"
            nullable: true
            go_type:
              type: "Decimal"
              import: "github.com/shopspring/decimal"
              pointer: true
          - db_type: "pg_catalog.numeric"
            go_type:
              type: "Decimal"
              import: "github.com/shopspring/decimal"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              type: "Decimal"
              import: "github.com/shopspring/decimal"
              pointer: true
          - db_type: "decimal"
            go_type:
              type: "Decimal"
              import: "github.com/shopspring/decimal"
          - db_type: "decimal"
            nullable: true
            go_type:
              type: "Decimal"
              import: "github.com/shopspring/decimal"
              pointer: true
          - db_type: "pg_catalog.timestamp"
            go_type:
              type: "Time"
              import: "time"
          - db_type: "pg_catalog.timestamptz"
            go_type:
              type: "Time"
              import: "time"
          - db_type: "pg_catalog.timestamptz"
            nullable: true
            go_type:
              type: "Time"
              import: "time"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              type: "Time"
              import: "time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "Time"
              import: "time"
              pointer: true
          - db_type: "date"
            go_type:
              type: "Time"
              import: "time"
          - db_type: "pg_catalog.time"
            go_type:
              type: "Time"
              import: "time"
          - db_type: "pg_catalog.time"
            nullable: true
            go_type:
              type: "Time"
              import: "time"
              pointer: true
          - db_type: "text"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          - db_type: "pg_catalog.int4"
            nullable: true
            go_type:
              type: "int"
              pointer: true
          - db_type: "pg_catalog.int4"
            go_type: "int"
          - db_type: "pg_catalog.bool"
            nullable: true
            go_type:
                type: "bool"
                pointer: true
