components:
  schemas:
    apperrors.AppError:
      properties:
        code:
          type: string
        message:
          type: string
        params:
          additionalProperties: {}
          type: object
      type: object
    database.MailingList:
      properties:
        created_at:
          type: string
        description:
          type: string
        id:
          type: string
        name:
          type: string
        updated_at:
          type: string
      type: object
    database.Recipient:
      properties:
        created_at:
          type: string
        email:
          type: string
        full_name:
          type: string
        id:
          type: string
        updated_at:
          type: string
      type: object
    database.Template:
      properties:
        created_at:
          type: string
        html_content:
          type: string
        id:
          type: string
        name:
          type: string
        plain_text_content:
          type: string
        updated_at:
          type: string
      type: object
    requests.AddRecipient:
      properties:
        email:
          type: string
        full_name:
          type: string
      required:
      - email
      - full_name
      type: object
    requests.CreateMailingList:
      properties:
        name:
          type: string
      required:
      - name
      type: object
    requests.CreateTemplate:
      properties:
        html_content:
          type: string
        name:
          type: string
        plain_text_content:
          type: string
      required:
      - html_content
      - name
      - plain_text_content
      type: object
    requests.UpdateMailingList:
      properties:
        name:
          type: string
      required:
      - name
      type: object
    requests.UpdateTemplate:
      properties:
        html_content:
          type: string
        name:
          type: string
        plain_text_content:
          type: string
      required:
      - html_content
      - name
      - plain_text_content
      type: object
